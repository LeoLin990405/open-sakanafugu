<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Self-Harness loop</title>
  <desc id="desc">Failed runs are mined for weaknesses, a harness agent proposes edits, validators test candidates, and only non-regressing edits are promoted.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .box { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1e293b; }
      .sub { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .tiny { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
    </style>
  </defs>
  <rect x="1" y="1" width="978" height="428" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="490" y="52" text-anchor="middle" class="title">Self-Harness: improve the harness, not the model</text>
  <text x="490" y="78" text-anchor="middle" class="sub">fugue implements an engine-native abstraction inspired by Shanghai AI Laboratory's Self-Harness paper</text>

  <rect x="54" y="136" width="176" height="108" rx="12" fill="#fee2e2" stroke="#ef4444"/>
  <text x="142" y="168" text-anchor="middle" class="box">1. Failed runs</text>
  <text x="142" y="194" text-anchor="middle" class="sub">verifier-grounded events</text>
  <text x="142" y="215" text-anchor="middle" class="tiny">RunEvent[]</text>

  <rect x="286" y="136" width="176" height="108" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="374" y="168" text-anchor="middle" class="box">2. Mine weakness</text>
  <text x="374" y="194" text-anchor="middle" class="sub">cluster cause + mechanism</text>
  <text x="374" y="215" text-anchor="middle" class="tiny">WeaknessCluster[]</text>

  <rect x="518" y="136" width="176" height="108" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="606" y="168" text-anchor="middle" class="box">3. Propose edit</text>
  <text x="606" y="191" text-anchor="middle" class="sub">bounded surface</text>
  <text x="606" y="210" text-anchor="middle" class="sub">replacement</text>
  <text x="606" y="229" text-anchor="middle" class="tiny">HarnessEdit[]</text>

  <rect x="750" y="136" width="176" height="108" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="838" y="168" text-anchor="middle" class="box">4. Validate</text>
  <text x="838" y="194" text-anchor="middle" class="sub">held-in + held-out tasks</text>
  <text x="838" y="215" text-anchor="middle" class="tiny">promote only if safe</text>

  <line x1="230" y1="260" x2="284" y2="260" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="462" y1="260" x2="516" y2="260" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="694" y1="260" x2="748" y2="260" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>

  <path d="M838 246 C820 330, 220 330, 142 248" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  <text x="490" y="320" text-anchor="middle" class="sub">new accepted harness config creates the next run baseline</text>

  <rect x="118" y="356" width="744" height="42" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="490" y="383" text-anchor="middle" class="sub">Editable surfaces include system prompt, memory sources, subagents, skills, bootstrap, execution, verification, recovery, and runtime policy.</text>
</svg>
